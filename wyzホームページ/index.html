<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyz | Hair Salon</title>
    <!-- 洗練された印象を与えるフォントを読み込み -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Noto+Sans+JP:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-inner">
            <h1 class="logo">Wyz</h1>
            <nav>
                <ul>
                    <li><a href="#home">HOME</a></li>
                    <li><a href="#menu">MENU</a></li>
                    <li><a href="#gallery">GALLERY</a></li>
                    <li><a href="#access">ACCESS</a></li>
                    <li><a href="#reserve">RESERVE</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <!-- Home: 画面いっぱいのメインビジュアル -->
        <section id="home" class="hero">
            <div class="hero-image">
                <img src="images/main-visual.jpg" alt="Wyz">
            </div>
        </section>

        <!-- Menu: 余白を活かしたリスト -->
        <section id="menu" class="section">
            <h2 class="section-title">MENU</h2>
            <div class="container">
                <dl class="menu-list">
                    <dt>Cut</dt><dd>¥5,500</dd>
                    <dt>Color</dt><dd>¥6,600 —</dd>
                    <dt>Perm</dt><dd>¥11,000 —</dd>
                    <dt>Treatment</dt><dd>¥4,400 —</dd>
                </dl>
            </div>
        </section>

        <!-- Gallery: グリッド表示 -->
        <section id="gallery" class="section">
            <h2 class="section-title">GALLERY</h2>
            <div class="gallery-grid">
                <div class="g-item"><img src="images/style1.jpg" alt=""></div>
                <div class="g-item"><img src="images/style2.jpg" alt=""></div>
                <div class="g-item"><img src="images/style3.jpg" alt=""></div>
                <div class="g-item"><img src="images/style4.jpg" alt=""></div>
            </div>
        </section>

        <!-- Access: 住所のテキストを削除しました -->
        <section id="access" class="section">
            <h2 class="section-title">ACCESS</h2>
            <div class="container">
                <div class="map-area">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d988.2828588211678!2d136.62929129997522!3d36.60327913810577!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x5ff9cdb1f380f823%3A0x5fd525300e2ebc56!2sWys!5e0!3m2!1sja!2sjp!4v1778840230287!5m2!1sja!2sjp" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </section>

        <!-- Reserve -->
        <section id="reserve" class="section">
            <h2 class="section-title">RESERVE</h2>
            <div class="container">
                <div class="calendar-area">
                    <p>Reservation Calendar</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Wyz</p>
    </footer>

</body>
</html>
